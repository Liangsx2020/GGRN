# Case 1: G-GRN vs PINN Convergence Comparison
# β⁻=1, β⁺=10 (standard contrast)
# Runs both methods across multiple resolutions

beta_minus: 1.0
beta_plus: 10.0
resolutions: 16,24,32,64
num_layers: 3
epochs: 1000
lr: 1.0

# Loss weights (same for both methods)
w_pde: 1.0
w_bc: 200.0
w_jump: 10.0

save_dir: ./results/case1/ggrn-vs-pinn
